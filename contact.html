	<h1>Contact Us! &#128231;</h1>
	
<!--contact form-->
	<div id="contact">
	
	<form class="form">
		<label for="fname">First name:</label><br>
  			<input type="text" id="fname" name="fname" value="John"><br>
 			<label for="lname">Last name:</label><br>
			<input type="text" id="lname" name="lname" value="Doe"><br>
		
		<label for="message">Send us a message!</label><br>
			<textarea id="message" value="Type your message here"></textarea><br>
		
		<label for="email">How can we reach out to you?</label><br>
			<input type="email" id="email" value="Your email"><br>
		
		<label for="checkbox">How did you find us?</label><br>
			<select id="exposure" name="exposure" multiple>
  				<option value="instagram">Instagram</option>
  				<option value="facebook">X (Twitter)</option>
  				<option value="twitter">Facebook</option>
  				<option value="browse">Browsing online</option>
				<option value="friend">Someone told me to check it out</option>
			</select><br><br>
  			<input type="send" value="Send" id="sendBtn">
		
	</form>
	</div>
	
</header>
	</div>
